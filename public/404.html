<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="refresh" content="0; url=/" />
    <script>
      // For GitHub Pages: redirect all 404s to index.html for SPA routing
      var l = window.location;
      var redirect = '/?redirect=' + encodeURIComponent(l.pathname + l.search + l.hash);
      window.location.replace(redirect);
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
  </body>
</html>
